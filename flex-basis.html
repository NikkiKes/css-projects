<!DOCTYPE html>
<html>
<head>
<style>
#main {
  width: 600px;
  height: 120px;
  border: 1px solid #c3c3c3;
  display: flex;
}

/* 50px */
.w50 {
  flex: 0 0 50px;
  background-color: #ff50f6;
}

/* 100px */
.w100 {
  flex: 0 0 100px;
  background-color: orange;
}

/* 150px */
.w150 {
  flex: 0 0 150px;
  background-color: #ff50a0;
}

/* 200px */
.w200 {
  flex: 0 0 200px;
  background-color: #ffb3e6;
}

</style>
</head>
<body>

<h1>Flex-basis</h1>

<div id="main">
  <div class="w50">50px</div>
  <div class="w100">100px</div>
  <div class="w150">150px</div>
  <div class="w200">200px</div>
  <div class="w50">50px</div>
  <div class="w200">200px</div>
  <div class="w150">150px</div>
  <div class="w100">100px</div>
  <div class="w50">50px</div>
</div>


</body>
</html>
